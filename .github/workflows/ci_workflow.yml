# This workflow will install Python dependencies, run tests and lint with a variety of Python versions

name: roman-wfi-reference-pipeline

on: 
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

env:
  COVERAGE: true  

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Cache pip dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install .[test]
    - name: Ruff Test
      run: |
        ruff check ./src
    - name: Run pytest with coverage
      id: run_pytest_coverage
      uses: ./.github/jobs/pytest
      with:
        coverage: ${{ env.COVERAGE }}

    - name: Generate coverage badge
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      run: genbadge coverage -i coverage.xml -o coverage-badge.svg

    - name: Push badge to coverage-info branch
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mkdir -p "$RUNNER_TEMP/coverage-artifacts"
        mv coverage-badge.svg coverage.xml "$RUNNER_TEMP/coverage-artifacts/"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        if ! git ls-remote --exit-code --heads origin coverage-info >/dev/null 2>&1; then
          echo "coverage-info branch does not exist on origin; skipping publish"
          exit 0
        fi

        git fetch origin coverage-info
        git checkout -B coverage-info origin/coverage-info
        git rm -rf . >/dev/null 2>&1 || true

        mv "$RUNNER_TEMP/coverage-artifacts/"* .
        git add coverage-badge.svg coverage.xml
        
        git commit -m "Update coverage badge [skip ci]"
        git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" coverage-info
